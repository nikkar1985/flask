<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #111, #222);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: #fff;
        }
        .card {
            background: #1e1e1e; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px; text-align: center;
            border: 1px solid #333;
        }
        h2 { color: #00cec9; margin-bottom: 25px; }
        input[type="url"] {
            width: 90%; padding: 12px; border: 2px solid #333; background: #2d2d2d;
            border-radius: 10px; font-size: 14px; outline: none; color: white; margin-bottom: 15px;
        }
        input[type="url"]:focus { border-color: #00cec9; }
        button {
            width: 96%; padding: 12px; border: none; background: #00cec9;
            color: #111; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #00b5b5; }
        .result-box {
            margin-top: 30px; padding: 15px; background: #2d2d2d; border-radius: 10px;
            border: 1px dashed #00cec9;
        }
        .result-box a { color: #00cec9; font-weight: bold; font-size: 18px; text-decoration: none; }
        .result-box a:hover { text-decoration: underline; }
        .error { color: #ff7675; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔗 URL Shortener</h2>
        
        <form method="POST">
            <input type="url" name="long_url" placeholder="Επικόλληση μεγάλου συνδέσμου εδώ..." required>
            <button type="submit">Μίκρυνέ το!</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if short_url %}
            <div class="result-box">
                <p style="margin: 0 0 10px 0; color: #aaa; font-size: 14px;">Έτοιμο το μικρό σου link:</p>
                <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
            </div>
        {% endif %}
    </div>

</body>
</html>
